ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 1. Take ONLY the forward linear velocity (X) from the slipping wheels
    odom0: /odom
    odom0_config: [false, false, false,  # X, Y, Z position (Set to FALSE)
                   false, false, false,  # roll, pitch, yaw
                   true,  false, false,  # X velocity (Set to TRUE)
                   false, false, false,  # roll, pitch, yaw velocities
                   false, false, false]  # ax, ay, az

    # 2. Take the ultra-precise Yaw and Yaw Velocity from the IMU
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]